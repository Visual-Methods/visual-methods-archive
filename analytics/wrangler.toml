name = "visualmethods-analytics"
main = "src/worker.js"
compatibility_date = "2026-06-24"

# Keep the dashboard private by default. It is visible during local
# wrangler dev because the Worker detects localhost.
workers_dev = false

[triggers]
crons = [
  "*/5 * * * *",
  "10 0 * * *",
  "30 0 1 * *"
]

[vars]
SITE_HOST = "visualmethods.pages.dev"
SITE_NAME = "The Visual Methods"
DASHBOARD_ENABLED = "false"
ANALYTICS_SOURCE = "cloudflare-web-analytics"
CF_ACCOUNT_ID = "4f91ca2c7e3dda891b1c6da63383b075"

[[d1_databases]]
binding = "ANALYTICS_DB"
database_name = "visualmethods_analytics"
database_id = "67fd81f3-62c4-467f-8052-1fef43f57b02"
